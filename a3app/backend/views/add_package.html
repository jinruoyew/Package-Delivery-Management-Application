<html>
    <head>
        <link href="/bootstrap.min.css" rel="stylesheet"/>
        <style>
            .image-title-container img {
                max-width: 100%; 
                max-height: 100%; 
                object-fit: contain; 
            }
            .image-title-container {
                display: flex;
                align-items: center; 
            }
            .centered-form {
                display: flex;
                justify-content: center; 
                align-items: center; 
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="card-header bg-primary">
                <div class="row image-title-container">
                    <div class="col" style="flex: 1;">
                        <img src="/logo.png" alt="Logo">
                    </div>
                    <div class="col text-white " style="flex: 6;">
                        <h1 style="font-size: xxx-large">Add New Package Form</h1>
                    </div>
                </div>
            </div>

            <%- include('./partials/navbar'); %>

            <div class="card-body centered-form">
                <div class="row w-100">
                    <div class="col-md-6 offset-md-3">
                        <form action="/33343276/JinRuo/add-package" method="post">
                            <div class="form-group">
                                <label for="package_title">Title:</label>
                                <input type="text" id="package_title" name="package_title" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="package_weight">Weight:</label>
                                <input type="number" id="package_weight" name="package_weight" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="package_destination">Destination:</label>
                                <input type="text" id="package_destination" name="package_destination" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="description">Description:</label>
                                <textarea id="description" name="description" class="form-control" rows="4"></textarea>
                            </div>
                            <div class="form-group">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="isAllocated" name="isAllocated">
                                    <label class="form-check-label" for="isAllocated">isAllocated</label>
                                </div>
                                <div class="form-group">
                                    <label for="driver_id">Driver ID:</label>
                                        <select id="driver_id" name="driver_id" class="form-select">
                                            <% for (let i = 0; i < db.length ; i++){ %>
                                                <option value="<%= db[i]._id %>" selected><%= db[i].driver_id %>&nbsp;<%= db[i].driver_name %></option>
                                            <% } %>
                                        </select>
                                </div>
                            <div class="pt-2">
                                <button class="btn btn-primary" type="submit">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <footer class="footer">
        <%- include('./partials/footer'); %>
    </footer>
</html>
