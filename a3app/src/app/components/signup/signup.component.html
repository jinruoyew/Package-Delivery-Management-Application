<div class="card">
    <div class="card-header">
        <h3>Signup</h3>
    </div>
    <div class="card-body centered-form">
        <form>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" class="form-control" [(ngModel)]="signup.username">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" class="form-control" [(ngModel)]="signup.password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" [(ngModel)]="signup.confirmPassword">
            </div>
            <button class="btn btn-primary" (click)="signupAuth()">Signup</button> <br>
            <div class="container pt-5">
                <button class="btn btn-secondary" (click)="switchLogin()">Login</button>
            </div>      
        </form>
    </div>
</div>
