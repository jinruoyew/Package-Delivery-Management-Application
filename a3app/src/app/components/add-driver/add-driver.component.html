<div class="container">
    <div class="card pt-6">
      <div class="card-header">Add Driver Form</div>
      <div class="card-body">
        <form>
            <div class="form-group">
                <label for="driver_name">Driver Name:</label>
                <input type="text" id="driver_name" name="driver_name" class="form-control" [(ngModel)]="driver.driver_name">
            </div>
            <div class="form-group">
                <label for="driver_department">Driver Department:</label>
                    <select id="driver_department" name="driver_department" class="form-select" [(ngModel)]="driver.driver_department">
                        <option value="Food" selected>Food</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Electronic">Electronic</option>
                    </select>
            </div>
            <div class="form-group">
                <label for="driver_licence">Driver Licence:</label>
                <input type="text" id="driver_licence" name="driver_licence" class="form-control" [(ngModel)]="driver.driver_licence">
            </div>
            <div class="form-group pt-2">
                <div class="form-check form-switch">
                    <label class="form-check-label" for="driver_isActive">isActive</label>
                    <input class="form-check-input" type="checkbox" id="driver_isActive" name="driver_isActive" [(ngModel)]="driver.driver_isActive">
                </div>
            </div>
            <div class="pt-3">
                <button class="btn btn-primary" (click)="addDriver()">Add Driver</button>
            </div>
        </form>
      </div>
    </div>
</div>
