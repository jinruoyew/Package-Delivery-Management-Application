<div class="container">
    <div class="card mt-6">
      <div class="card-header">Add Package Form</div>
      <div class="card-body">
        <form>
            <div class="form-group">
                <label for="package_title">Title:</label>
                <input type="text" id="package_title" name="package_title" class="form-control" [(ngModel)]="package.package_title">
            </div>
            <div class="form-group">
                <label for="package_weight">Weight:</label>
                <input type="number" id="package_weight" name="package_weight" class="form-control" [(ngModel)]="package.package_weight">
            </div>
            <div class="form-group">
                <label for="package_destination">Destination:</label>
                <input type="text" id="package_destination" name="package_destination" class="form-control" [(ngModel)]="package.package_destination">
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <input type="text" id="description" name="description" class="form-control" [(ngModel)]="package.description">
            </div>
            <div class="form-group">
                <div class="form-check form-switch">
                    <label class="form-check-label" for="isAllocated">isAllocated</label>
                    <input class="form-check-input" type="checkbox" id="isAllocated" name="package_isAllocated" [(ngModel)]="package.isAllocated">
                </div>
            </div>
            <div class="form-group">
                <label for="driver_id">Driver Id:</label>
                <select id="driver_id" name="driver_id" class="form-select" [(ngModel)]="package.driver_id">
                    @for(driver of driversDb;track $index){
                        <option value="{{driver._id}}">{{driver.driver_id}}&nbsp;{{driver.driver_name}}</option>
                    }
                </select>
            </div>
            <div class="pt-5">
                <button class="btn btn-primary" (click)="addPackage()">Add Package</button>
            </div>
        </form>
      </div>
    </div>
</div>
