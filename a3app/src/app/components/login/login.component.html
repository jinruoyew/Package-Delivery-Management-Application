<div class="card">
    <div class="card-header">
        <h3>Login</h3>
    </div>
    <div class="card-body centered-form">
        <form>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" class="form-control" [(ngModel)]="login.username">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" class="form-control" [(ngModel)]="login.password">
            </div>
            <button class="btn btn-primary" (click)="loginAuth()"> Login</button> <br>
            <div class="container pt-5">
                <button class="btn btn-secondary" (click)="switchSignup()">Signup</button>
            </div>      
        </form>
    </div>
</div>
